steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/reporters-desk', '.']
    
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/reporters-desk']
    
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'reporters-desk'
      - '--image'
      - 'gcr.io/$PROJECT_ID/reporters-desk'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      # Note: Set your PAYLOAD_SECRET and DATABASE_URI in the Cloud Run service configuration manually 
      # or reference them here via Secret Manager.
      
images:
  - 'gcr.io/$PROJECT_ID/reporters-desk'

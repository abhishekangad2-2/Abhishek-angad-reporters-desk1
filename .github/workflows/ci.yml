name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          PAYLOAD_API_URL: https://placeholder.invalid # build-time only, never a real secret
          DATABASE_URI: postgres://postgres:password@127.0.0.1:5432/reporters_desk # local placeholder for build
          PAYLOAD_SECRET: placeholder_secret_key

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Gate: a red lint must not ship. deploy `needs:` this, so a failing lint
  # blocks the deploy (previously CI ran independently and never gated deploy).
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/941847389917/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@abhishek-angad-reporters-desk1.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        # Tag by commit SHA (immutable, auditable, rollback-able by tag) AND
        # latest (Cloud Run deploys the pinned SHA below).
        run: |
          IMG=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/reportersdesk-repo/cms
          docker build -t "$IMG:${{ github.sha }}" -t "$IMG:latest" .
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: reportersdesk-cms
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/reportersdesk-repo/cms:${{ github.sha }}
          region: us-central1
          # Non-sensitive config only. Razorpay/Resend are intentionally "none".
          env_vars: |
            GCS_BUCKET_NAME=reportersdesk-media-secret-walker-497804-d5
            GCS_PROJECT_ID=secret-walker-497804-d5
            MEDIA_CDN_BASE_URL=https://cdn.reportersdesk.abhishekangad.com
            RAZORPAY_KEY_ID=none
            RAZORPAY_KEY_SECRET=none
            RAZORPAY_PLAN_ID_READER=none
            RAZORPAY_PLAN_ID_FOI_PATRON=none
            RESEND_API_KEY=none
            VERTEX_PROJECT=secret-walker-497804-d5
            VERTEX_LOCATION=us-central1
          # Sensitive values come from Secret Manager (not GitHub Secrets / plaintext env).
          # (Gemini now uses Vertex AI via the service account — no API key.)
          secrets: |
            DATABASE_URI=database-uri:latest
            PAYLOAD_SECRET=payload-secret:latest
            PENDING_2FA_SECRET=pending-2fa-secret:latest
            GOOGLE_CLOUD_VISION_API_KEY=google-cloud-vision-api-key:latest
          # Preserve the Cloud SQL socket connection the DATABASE_URI relies on.
          # 2Gi memory: Payload + sharp image processing and large video uploads
          # (100MB+) need headroom beyond the 512Mi default.
          flags: '--add-cloudsql-instances=abhishek-angad-reporters-desk1:us-central1:reportersdesk-db --memory=2Gi --cpu=2 --min-instances=1'

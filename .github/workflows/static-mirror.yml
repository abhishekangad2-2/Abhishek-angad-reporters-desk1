name: Static Resilience Mirror

on:
  workflow_call:
  schedule:
    - cron: '0 */6 * * *' # also refresh on a schedule, independent of deploys
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build the static snapshot
        working-directory: reportersdesk-infra
        run: node scripts/build-static-mirror.mjs
        env:
          PAYLOAD_API_URL: ${{ secrets.PAYLOAD_API_URL }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy reportersdesk-infra/mirror --project-name=reportersdesk-mirror

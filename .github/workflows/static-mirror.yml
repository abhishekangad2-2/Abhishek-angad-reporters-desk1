name: Static Resilience Mirror

on:
  workflow_call:
  # Manual-only until Cloudflare Pages secrets are configured. (Was a 6-hourly
  # cron that failed every run because the paths below were wrong.)
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build the static snapshot
        # The script lives at scripts/build-static-mirror.mjs (repo root) and
        # writes to ./mirror — there is no reportersdesk-infra directory.
        run: node scripts/build-static-mirror.mjs
        env:
          PAYLOAD_API_URL: ${{ secrets.PAYLOAD_API_URL }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy mirror --project-name=reportersdesk-mirror
